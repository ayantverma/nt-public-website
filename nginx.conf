# Nginx server block for the Northern Trust redesign SPA.
# Serves the static Vite build output (`dist/`) with SPA-style deep-link fallback.

server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Long-cache hashed assets emitted by Vite
  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    try_files $uri =404;
  }

  # Static files with extensions: cache for a day, fall through if missing
  location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|avif|woff2?|ttf|otf|eot|map)$ {
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # SPA fallback — every unmatched route returns index.html so React Router
  # can resolve client-side.
  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }

  # Custom error page falls back to the SPA so it can render the 404 route
  error_page 404 /index.html;
}